<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <title>Mersutti</title>

 <!-- Bold geometric font similar to your example -->
 <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">

 <style>
   body {
     margin: 0;
     background-color: #000035;
     display: flex;
     flex-direction: column;
     justify-content: center;
     align-items: center;
     height: 100vh;
     font-family: Arial, sans-serif;
   }

   .title {
     font-family: 'Montserrat', Arial, sans-serif;
     font-size: 27px;
     color: #fff9e6;
     font-weight: 800;
     letter-spacing: 2px;
     text-transform: uppercase;
     text-shadow: 0 0 8px rgba(255, 249, 230, 0.3);
   }

   .subtitle {
     margin-top: 20px; /* spacing below Mersutti */
     font-size: 18px;
     color: rgba(255, 255, 255, 0.6);
     font-family: Arial, sans-serif;
     text-transform: uppercase;
   }

   .footer {
     position: absolute;
     bottom: 15px;
     font-size: 14px;
     color: rgba(255, 255, 255, 0.6); /* softer white */
     font-family: Arial, sans-serif;
   }
 </style>
</head>

<body>

 <div class="title">Mersutti</div>

 <div class="subtitle">UNDER CONSTRUCTION</div>

 <div class="footer">© 2026</div>

</body>
</html>
